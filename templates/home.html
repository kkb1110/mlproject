<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Performance Predictor</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          Inter,
          Segoe UI,
          Arial,
          sans-serif;
      }

      body {
        background: #f5f7fa;
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
      }

      .login {
        width: 100%;
        max-width: 650px;
      }

      form {
        background: #ffffff;
        border-radius: 18px;
        padding: 38px;
        border: 1px solid #e5e7eb;
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.06),
          0 2px 8px rgba(0, 0, 0, 0.03);

        animation: slideUp 0.6s ease;
      }

      legend {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #6b7280;
        margin-bottom: 30px;
        font-size: 15px;
      }

      .mb-3 {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #374151;
      }

      .form-control {
        width: 100%;
        padding: 14px 16px;
        font-size: 15px;

        border: 1px solid #d1d5db;
        border-radius: 12px;

        transition: 0.25s ease;
        background: #fafafa;
      }

      .form-control:hover {
        border-color: #9ca3af;
      }

      .form-control:focus {
        outline: none;
        border-color: #2563eb;
        background: white;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      .btn {
        width: 100%;
        margin-top: 12px;

        background: #111827;
        color: white;

        border: none;
        border-radius: 12px;

        padding: 15px;

        font-size: 16px;
        font-weight: 600;

        cursor: pointer;

        transition: 0.25s;
      }

      .btn:hover {
        background: #1f2937;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .result {
        margin-top: 25px;

        background: #ecfdf5;
        border: 1px solid #10b98133;

        color: #065f46;

        padding: 18px;

        border-radius: 14px;

        font-size: 22px;
        font-weight: 600;

        text-align: center;

        animation: fadeIn 0.5s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 700px) {
        body {
          padding: 20px;
        }

        form {
          padding: 28px;
        }

        legend {
          font-size: 24px;
        }
      }
    </style>
  </head>

  <body>
    <div class="login">
      <form action="{{ url_for('predict_datapoint') }}" method="post">
        <legend>🎓 Student Exam Performance Prediction</legend>
        <p class="subtitle">
          Predict a student's mathematics score based on demographic and
          academic information.
        </p>

        <div class="mb-3">
          <label>Gender</label>

          <select class="form-control" name="gender" required>
            <option selected disabled value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Race or Ethnicity</label>

          <select class="form-control" name="ethnicity" required>
            <option selected disabled value="">Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Parental Level of Education</label>

          <select
            class="form-control"
            name="parental_level_of_education"
            required
          >
            <option selected disabled value="">Select Parent Education</option>

            <option value="associate's degree">Associate's Degree</option>

            <option value="bachelor's degree">Bachelor's Degree</option>

            <option value="high school">High School</option>

            <option value="master's degree">Master's Degree</option>

            <option value="some college">Some College</option>

            <option value="some high school">Some High School</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Lunch Type</label>

          <select class="form-control" name="lunch" required>
            <option selected disabled value="">Select Lunch Type</option>

            <option value="free/reduced">Free / Reduced</option>

            <option value="standard">Standard</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Test Preparation Course</label>

          <select class="form-control" name="test_preparation_course" required>
            <option selected disabled value="">Select Course</option>

            <option value="none">None</option>

            <option value="completed">Completed</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Reading Score</label>

          <input
            class="form-control"
            type="number"
            name="reading_score"
            placeholder="Enter Reading Score"
            min="0"
            max="100"
            required
          />
        </div>

        <div class="mb-3">
          <label>Writing Score</label>

          <input
            class="form-control"
            type="number"
            name="writing_score"
            placeholder="Enter Writing Score"
            min="0"
            max="100"
            required
          />
        </div>

        <div class="mb-3">
          <input class="btn" type="submit" value="Predict Maths Score" />
        </div>
      </form>

      
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, "Segoe UI", sans-serif;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
            animation: fadeUp .8s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 15px 34px;
            background: #111827;
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            transition: .3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #1f2937;
            box-shadow: 0 12px 25px rgba(0, 0, 0, .12);
        }

        .btn:active {
            transform: scale(.98);
        }

        /* Decorative background circles */

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .25;
            z-index: -1;
            animation: float 10s ease-in-out infinite;
        }

        body::before {
            width: 260px;
            height: 260px;
            background: #3b82f6;
            top: -80px;
            left: -60px;
        }

        body::after {
            width: 220px;
            height: 220px;
            background: #10b981;
            bottom: -80px;
            right: -60px;
            animation-delay: 2s;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(25px);
            }
        }

        @media(max-width:768px) {

            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }

            .container {
                padding: 25px;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Student Performance Predictor</h1>

        <p>
            Predict a student's mathematics score using demographic and academic
            information. Built with Machine Learning and deployed using Flask.
        </p>

        <a href="{{ url_for('predict_datapoint') }}" class="btn">
            Start Prediction →
        </a>

    </div>

</body>

</html>
